<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#bg-grad)"/>
  <!-- Inner circle (sun motif) -->
  <circle cx="256" cy="220" r="120" fill="#fff" opacity="0.15"/>
  <!-- Japanese character: 学 (manabu - to learn) -->
  <text x="256" y="280" text-anchor="middle" font-family="'Hiragino Sans', 'Yu Gothic', 'Noto Sans JP', sans-serif" font-weight="700" font-size="220" fill="#ffffff">学</text>
  <!-- Bottom accent bar -->
  <rect x="120" y="390" width="272" height="8" rx="4" fill="url(#accent-grad)"/>
  <!-- Small torii gate accent -->
  <g transform="translate(256, 430)" fill="#ffffff" opacity="0.9">
    <!-- Torii pillars -->
    <rect x="-30" y="-8" width="6" height="28" rx="2"/>
    <rect x="24" y="-8" width="6" height="28" rx="2"/>
    <!-- Torii top beam -->
    <rect x="-38" y="-14" width="76" height="6" rx="3"/>
    <!-- Torii second beam -->
    <rect x="-32" y="-4" width="64" height="4" rx="2"/>
  </g>
</svg>
